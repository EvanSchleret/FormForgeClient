name: Bug report
description: Report a reproducible bug in FormForge Client
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening a bug report.
        Please provide enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal, reproducible steps.
      placeholder: |
        1. Configure Nuxt module ...
        2. Render form ...
        3. Submit payload ...
        4. Observe error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please share relevant versions and execution context.
      placeholder: |
        - @evanschleret/formforgeclient version:
        - Nuxt version:
        - @nuxt/ui version:
        - Bun version:
        - Browser/runtime (SSR/CSR):
        - FormForge backend version (if relevant):
    validations:
      required: true
