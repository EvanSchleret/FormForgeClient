name: Feature request
description: Suggest an enhancement for FormForge Client
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea.
        Describe the problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see implemented?
      placeholder: Add support for ...
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Is this runtime API, renderer, validation, upload flow, or docs?
      placeholder: Runtime API / Nuxt UI renderer / validation / upload / docs
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternatives you evaluated?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any extra details, links, or examples.
    validations:
      required: false
